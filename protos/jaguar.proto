syntax = "proto3";

package jaguar;

message Empty{}

message JaguarRequest {
    string jaguarId = 1;
}

message JaguarLocation{
    string jaguarId = 1;
    string name = 2;
    double latitude = 3;
    double longitude = 4;
    string timestamp = 5;
}

message JaguarList {
    repeated JaguarLocation jaguars = 1;
}

service JaguarTrackingService {
    rpc GetAllJaguars(Empty) returns (JaguarList);
    rpc GetJaguarLocation(JaguarRequest) returns (JaguarLocation);
    rpc StreamJaguarMovement(JaguarRequest) returns (stream JaguarLocation);
}