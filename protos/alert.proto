syntax = "proto3";

package alert;

message Empty{}

message AlertRequest{
    string alertType = 1;
    string severity = 2;
    string region = 3;
    string message = 4;
}

message AlertResponse{
    string status = 1;
    string responseMessage = 2;
    string recommendationAction = 3;
}

message AlertChat{
    string message = 1;
}

message AlertMessage {
    string message = 1;
}

service AlertService{
    rpc SendAlert(AlertRequest) returns (AlertResponse);
    rpc LiveAlertChat(stream AlertChat) returns (stream AlertMessage);
}